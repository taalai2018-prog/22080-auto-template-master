<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>22080 Авто-шаблон</title>
  <meta name="description" content="22080 авто-шаблон: меняется один JSON-файл, сайт обновляется автоматически." />
  <style>
    :root{
      --blue:#2458a8;
      --blue-dark:#163f7c;
      --green:#1f8a4c;
      --bg:#eef3fb;
      --card:#ffffff;
      --text:#1c2640;
      --muted:#5f6c8d;
      --line:#d6e1f2;
      --shadow:0 12px 30px rgba(18,48,96,.10);
      --radius:22px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:"Times New Roman", Times, serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{max-width:1080px;margin:0 auto;padding:18px}
    .hero{
      background:linear-gradient(135deg,var(--blue) 0%, var(--blue-dark) 100%);
      color:#fff;
      border-radius:30px;
      padding:28px 26px;
      box-shadow:var(--shadow);
    }
    .hero h1{margin:0 0 12px;font-size:clamp(28px,4vw,54px);line-height:1.15}
    .hero .lead{font-size:clamp(18px,2vw,24px);margin:12px 0}
    .badge{
      display:inline-block;margin-top:10px;padding:14px 20px;border-radius:999px;
      background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);font-size:16px;
    }
    .nav{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 8px}
    .nav a{
      text-decoration:none;color:#fff;background:rgba(255,255,255,.14);padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.22)
    }
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-top:18px;box-shadow:var(--shadow)
    }
    h2{margin:0 0 14px;color:var(--blue-dark);font-size:clamp(24px,3vw,42px)}
    h3{margin:0 0 10px;color:var(--blue-dark);font-size:26px}
    p,li{font-size:20px;line-height:1.6}
    .muted{color:var(--muted)}
    .video-frame,.video-file{
      width:100%;aspect-ratio:16/9;border:none;border-radius:18px;background:#09152a;box-shadow:inset 0 0 0 2px #9db7de
    }
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
    .col-6{grid-column:span 6}
    .col-12{grid-column:span 12}
    @media (max-width:820px){.col-6{grid-column:span 12}}
    table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:16px;border:1px solid var(--line)}
    th,td{padding:14px 12px;border-bottom:1px solid var(--line);vertical-align:top;font-size:18px}
    th{background:#e7f0ff;color:var(--blue-dark);text-align:left}
    .doc-lines{background:#f9fbff;border:1px dashed #8fb0dd;border-radius:16px;padding:16px}
    .doc-line{padding:10px 0;border-bottom:1px dashed #cedcf3;font-size:19px}
    .doc-line:last-child{border-bottom:none}
    .callout{background:#eef7f0;border-left:6px solid var(--green);padding:14px 16px;border-radius:14px}
    .files a{display:block;padding:12px 14px;margin:8px 0;border-radius:12px;background:#f7faff;border:1px solid var(--line);text-decoration:none;color:var(--blue-dark)}
    .footer-note{font-size:15px;color:var(--muted);text-align:center;padding:18px 8px 30px}
    .small{font-size:16px}
    .error{background:#fff0f0;color:#8b1e1e;border:1px solid #efb5b5;border-radius:14px;padding:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 id="title">22080 — Авто-шаблон</h1>
      <p class="lead" id="format"></p>
      <p class="lead" id="goal"></p>
      <div class="badge" id="badge"></div>
      <div class="nav" id="nav"></div>
    </section>

    <section class="card" id="video-section">
      <h2 id="video-title">1. Видео урок</h2>
      <div id="video-box"></div>
      <p class="muted small">Можно вставить ссылку YouTube/VK Video embed или локальный файл MP4 из папки <b>assets</b>.</p>
    </section>

    <section class="card" id="theory-section">
      <h2 id="theory-title"></h2>
      <div id="theory-box"></div>
    </section>

    <section class="card" id="table-section">
      <h2 id="table-title"></h2>
      <div id="table-box"></div>
    </section>

    <div class="grid">
      <section class="card col-6" id="blank-section">
        <h2 id="blank-title"></h2>
        <div class="doc-lines" id="blank-box"></div>
      </section>
      <section class="card col-6" id="practice-section">
        <h2 id="practice-title"></h2>
        <div class="callout" id="practice-box"></div>
      </section>
    </div>

    <section class="card" id="questions-section">
      <h2 id="questions-title"></h2>
      <ol id="questions-box"></ol>
    </section>

    <section class="card" id="submit-section">
      <h2 id="submit-title"></h2>
      <ul id="submit-box"></ul>
    </section>

    <section class="card" id="files-section">
      <h2 id="files-title"></h2>
      <div class="files" id="files-box"></div>
    </section>

    <div class="footer-note">
      22080 авто-шаблон: меняйте только файл <b>lesson.json</b>, а сайт обновится сам после сохранения в GitHub Pages.
    </div>
  </div>

  <script>
    const sections = [
      {id:'video-section', title:'Видео'},
      {id:'theory-section', title:'Теория'},
      {id:'table-section', title:'Таблица'},
      {id:'blank-section', title:'Бланк'},
      {id:'practice-section', title:'Практика'},
      {id:'questions-section', title:'Вопросы'},
      {id:'submit-section', title:'Что сдаёт студент'},
      {id:'files-section', title:'Файлы'}
    ];

    function setText(id, value){
      document.getElementById(id).textContent = value || '';
    }
    function show(id, visible){
      document.getElementById(id).style.display = visible ? '' : 'none';
    }
    function esc(s){
      return String(s ?? '').replace(/[&<>\"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
    }
    function renderNav(data){
      const nav = document.getElementById('nav');
      nav.innerHTML = '';
      sections.forEach(s => {
        const shouldShow = {
          'video-section': data.video_embed_url || data.video_file,
          'theory-section': data.theory_paragraphs?.length,
          'table-section': data.table_headers?.length && data.table_rows?.length,
          'blank-section': data.blank_lines?.length,
          'practice-section': data.practice_items?.length,
          'questions-section': data.questions?.length,
          'submit-section': data.submit_items?.length,
          'files-section': data.files?.length
        }[s.id];
        if (shouldShow) {
          const a = document.createElement('a');
          a.href = `#${s.id}`;
          a.textContent = s.title;
          nav.appendChild(a);
        }
      });
    }

    async function init(){
      try{
        const res = await fetch('lesson.json?v=' + Date.now(), {cache:'no-store'});
        const data = await res.json();

        document.title = data.site_title || data.title || '22080 сайт';
        setText('title', data.title);
        setText('format', data.format);
        setText('goal', data.goal);
        setText('badge', data.badge || 'Шаблон 22080 • Видео + таблица + бланк + практика + вопросы');

        renderNav(data);

        // video
        setText('video-title', data.video_title || '1. Видео урок');
        const vb = document.getElementById('video-box');
        vb.innerHTML = '';
        if (data.video_embed_url) {
          vb.innerHTML = `<iframe class="video-frame" src="${esc(data.video_embed_url)}" allowfullscreen loading="lazy"></iframe>`;
          show('video-section', true);
        } else if (data.video_file) {
          vb.innerHTML = `<video class="video-file" controls preload="metadata"><source src="${esc(data.video_file)}"></video>`;
          show('video-section', true);
        } else {
          show('video-section', false);
        }

        // theory
        setText('theory-title', data.theory_title || '2. Краткая теория');
        const th = document.getElementById('theory-box');
        th.innerHTML = (data.theory_paragraphs || []).map(p => `<p>${esc(p)}</p>`).join('');
        show('theory-section', (data.theory_paragraphs || []).length > 0);

        // table
        setText('table-title', data.table_title || '3. Таблица / схема');
        const tb = document.getElementById('table-box');
        if ((data.table_headers || []).length && (data.table_rows || []).length) {
          const headers = data.table_headers.map(h => `<th>${esc(h)}</th>`).join('');
          const rows = data.table_rows.map(r => `<tr>${r.map(c => `<td>${esc(c)}</td>`).join('')}</tr>`).join('');
          tb.innerHTML = `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
          show('table-section', true);
        } else {
          show('table-section', false);
        }

        // blank
        setText('blank-title', data.blank_title || '4. Бланк / образец');
        const bb = document.getElementById('blank-box');
        bb.innerHTML = (data.blank_lines || []).map(x => `<div class="doc-line">${esc(x)}</div>`).join('');
        show('blank-section', (data.blank_lines || []).length > 0);

        // practice
        setText('practice-title', data.practice_title || '5. Практика');
        const pb = document.getElementById('practice-box');
        pb.innerHTML = `<ol>${(data.practice_items || []).map(x => `<li>${esc(x)}</li>`).join('')}</ol>`;
        show('practice-section', (data.practice_items || []).length > 0);

        // questions
        setText('questions-title', data.questions_title || '6. Контрольные вопросы');
        const qb = document.getElementById('questions-box');
        qb.innerHTML = (data.questions || []).map(x => `<li>${esc(x)}</li>`).join('');
        show('questions-section', (data.questions || []).length > 0);

        // submit
        setText('submit-title', data.submit_title || '7. Что сдаёт студент');
        const sb = document.getElementById('submit-box');
        sb.innerHTML = (data.submit_items || []).map(x => `<li>${esc(x)}</li>`).join('');
        show('submit-section', (data.submit_items || []).length > 0);

        // files
        setText('files-title', data.files_title || '8. Файлы и ссылки');
        const fb = document.getElementById('files-box');
        if ((data.files || []).length) {
          fb.innerHTML = data.files.map(f => `<a href="${esc(f.url)}" target="_blank" rel="noopener">${esc(f.name)}</a>`).join('');
          show('files-section', true);
        } else {
          show('files-section', false);
        }

      } catch(err) {
        document.body.innerHTML = `<div class="wrap"><div class="card error"><h2>Ошибка загрузки lesson.json</h2><p>Проверьте, что файл <b>lesson.json</b> лежит рядом с <b>index.html</b>.</p><p class="small">${esc(err.message)}</p></div></div>`;
      }
    }
    init();
  </script>
</body>
</html>
